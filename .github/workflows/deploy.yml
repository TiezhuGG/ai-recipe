name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.DEPLOY_PORT }}" -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Validate private key
        shell: bash
        run: |
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Deploy on server
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ vars.DEPLOY_PORT }}" "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" "DEPLOY_PATH='${{ vars.DEPLOY_PATH }}' bash -s" << 'EOF'
            set -Eeuo pipefail
            cd "${DEPLOY_PATH}"

            git checkout main
            git reset --hard HEAD
            previous_commit="$(git rev-parse HEAD)"
            echo "Previous commit: ${previous_commit}"

            git fetch --all --prune
            git pull --ff-only origin main

            current_commit="$(git rev-parse HEAD)"
            echo "Deploying commit: ${current_commit}"

            deploy_and_verify() {
              sudo docker compose up -d --build --remove-orphans
              sudo bash scripts/health-check.sh
            }

            if deploy_and_verify; then
              echo "Deploy succeeded"
              sudo docker compose ps
              exit 0
            fi

            echo "Deploy failed, rolling back to ${previous_commit}"
            sudo docker compose ps || true
            sudo docker compose logs --tail=120 backend frontend db || true
            git checkout main
            git reset --hard "${previous_commit}"

            if deploy_and_verify; then
              echo "Rollback succeeded"
              sudo docker compose ps
            else
              echo "Rollback failed"
              sudo docker compose ps || true
              sudo docker compose logs --tail=120 backend frontend db || true
            fi

            exit 1
          EOF
