name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.DEPLOY_PORT }}" -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Validate private key
        shell: bash
        run: |
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Deploy on server
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ vars.DEPLOY_PORT }}" "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" << EOF
            set -e
            cd "${{ vars.DEPLOY_PATH }}"

            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            sudo docker compose up -d --build
            sudo docker compose ps
          EOF
