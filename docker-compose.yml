services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    container_name: recipe-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recipe_db}
      POSTGRES_USER: ${POSTGRES_USER:-recipe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipe_user} -d ${POSTGRES_DB:-recipe_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: recipe-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://recipe_user:change_me_in_production@db:5432/recipe_db}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api-inference.modelscope.cn/v1}
      MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen3.5-35B-A3B}
      IMAGE_MODEL_NAME: ${IMAGE_MODEL_NAME:-}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      APP_ENV: ${APP_ENV:-production}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-session_id}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      SESSION_COOKIE_MAX_AGE: ${SESSION_COOKIE_MAX_AGE:-2592000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_TIMEOUT: ${API_TIMEOUT:-120}
      API_MAX_RETRIES: ${API_MAX_RETRIES:-2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:18-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:alpine}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: recipe-frontend
    restart: always
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: recipe-network
